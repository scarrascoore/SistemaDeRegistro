<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Sistema de Registro</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="auth-card">
      <div class="auth-icon">✅</div>

      <h1 class="auth-title">Bienvenido</h1>
      <p class="auth-subtitle">Has iniciado sesión correctamente.</p>

      <div class="form-group">
        <label>USUARIO AUTENTICADO</label>
        <input id="dashboardEmail" type="text" readonly />
      </div>

      <p id="dashboardMessage" class="form-message success">
        Sesión activa.
      </p>

      <button id="logoutButton" class="primary-button" type="button">
        Cerrar sesión
      </button>
    </section>
  </main>

  <script src="/js/dashboard.js"></script>
</body>
</html>
