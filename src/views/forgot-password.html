<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña | Sistema de Registro</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="auth-card">
      <div class="auth-icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h1 class="auth-title">Recuperar contraseña</h1>
      <p class="auth-subtitle">
        Ingresa tu correo y te enviaremos un código OTP para restablecer tu contraseña.
      </p>

      <form id="forgotPasswordForm" class="auth-form" novalidate>
        <div class="mb-3">
          <label for="recoveryEmail" class="form-label form-label-custom">CORREO ELECTRÓNICO</label>
          <input
            id="recoveryEmail"
            name="email"
            type="email"
            class="form-control form-control-lg"
            placeholder="nombre@ejemplo.com"
            maxlength="120"
            autocomplete="email"
            required
          />
        </div>

        <p id="recoveryMessage" class="form-message" aria-live="polite"></p>

        <button id="sendRecoveryOtpButton" type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
          Enviar código de recuperación
        </button>
      </form>

      <section id="resetSection" class="auth-form hidden mt-4">
        <div class="mb-3">
          <label for="recoveryOtp" class="form-label form-label-custom">CÓDIGO OTP</label>
          <input
            id="recoveryOtp"
            type="text"
            class="form-control form-control-lg text-uppercase"
            maxlength="6"
            placeholder="ABC123"
          />
        </div>

        <p class="otp-timer-text">
          Tiempo restante: <strong id="recoveryCountdownText">05:00</strong>
        </p>

        <p id="otpVerifyMessage" class="form-message" aria-live="polite"></p>

        <button id="verifyRecoveryOtpButton" type="button" class="btn btn-primary w-100 py-3 fw-semibold">
          Verificar código
        </button>

        <button
          id="resendRecoveryOtpButton"
          type="button"
          class="btn btn-outline-secondary w-100 mt-3"
          disabled
        >
          Reenviar código
        </button>

        <hr class="my-4" />

        <div class="mb-3">
          <label for="newPassword" class="form-label form-label-custom">NUEVA CONTRASEÑA</label>
          <div class="password-field">
            <input
              id="newPassword"
              type="password"
              class="form-control form-control-lg"
              minlength="8"
              maxlength="64"
              placeholder="••••••••"
              disabled
            />
            <button
              type="button"
              id="toggleNewPassword"
              class="toggle-password"
              aria-label="Mostrar contraseña"
              disabled
            >
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label for="confirmNewPassword" class="form-label form-label-custom">CONFIRMAR NUEVA CONTRASEÑA</label>
          <div class="password-field">
            <input
              id="confirmNewPassword"
              type="password"
              class="form-control form-control-lg"
              minlength="8"
              maxlength="64"
              placeholder="••••••••"
              disabled
            />
            <button
              type="button"
              id="toggleConfirmNewPassword"
              class="toggle-password"
              aria-label="Mostrar contraseña"
              disabled
            >
              <i class="bi bi-eye-slash"></i>
            </button>
          </div>
        </div>

        <p id="resetMessage" class="form-message" aria-live="polite"></p>

        <button
          id="resetPasswordButton"
          type="button"
          class="btn btn-primary w-100 py-3 fw-semibold"
          disabled
        >
          Restablecer contraseña
        </button>
      </section>

      <p class="auth-footer">
        <a href="/login">Volver al login</a>
      </p>
    </section>
  </main>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
